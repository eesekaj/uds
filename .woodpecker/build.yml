matrix:
  RUST: [stable, nightly]
  PLATFORM:
    - linux/amd64
    - freebsd/amd64

steps:
  - name: Linux_x86_64
    image: rust
    when: 
      - event: [push, pull_request]
        matrix:
          PLATFORM: linux/amd64
    commands:
      - echo "Running on $(uname -a)"
      - echo "Woodpecker Matrix Platform is ${PLATFORM}"
      - rustup default $RUST
      - cargo check
      - cargo test

  - name: FreeBSD_x86_64
    image: localhost/freebsd-runtime
    when:
      - event: [push, pull_request]
        matrix:
          PLATFORM: freebsd/amd64
    commands:
      - echo "Running on $(uname -m)"
      - echo "Woodpecker Matrix Platform is ${PLATFORM}"
      - pkg add rust
      - rustup default $RUST
      - cargo check
      - cargo test
      
