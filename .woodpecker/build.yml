matrix:
  RUST: [stable, nightly]
  PLATFORM:
    - linux/amd64
    - freebsd/amd64

steps:
  - name: Linux_x86_64
    image: rust
    when: 
      - event: [push, pull_request]
        matrix:
          RUST: stable
          PLATFORM: linux/amd64
    commands:
      - echo "Running on $(uname -a)"
      - echo "Woodpecker Matrix Platform is ${PLATFORM}"
      - rustup default $RUST
      - cargo check
      - cargo test


